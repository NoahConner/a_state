<div class="thankyouMain">
  <div class="topBanner">
    <div class="container">
      <div class="h1">
        {{ titleLine1 | translate }} <br />
        {{ titleLine2 | translate }}
      </div>
    </div>
  </div>
</div>

<section class="thank-you-section py-5">
  <div class="container">
    <p>
      {{ description | translate }}
    </p>

    <button class="btn send-btn" [routerLink]="type === 'career' ? '/careers' : '/'">
      {{ button | translate }}
    </button>
  </div>
</section>

<div class="footUpper">
  <div class="left"></div>
  <div class="right"></div>
  <div class="clipp"></div>
  <div class="contain">
    <div class="container">
      <div class="row">
        <div class="col-lg-6 col-sm-6 col-xs-12">
          <div class="icon">
            <img src="/assets/images/logo.png" alt="User menu" />
          </div>
        </div>
        <div class="col-lg-6 col-sm-6 col-xs-12">
          <div class="h4">{{ 'FOOTER.SLOGAN' | translate }}</div>
        </div>
      </div>
    </div>
  </div>
</div>
